<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-3 終極探索：空間變形水箱</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Heiti TC', sans-serif; 
            background: #1a202c; overflow: hidden; color: white;
        }
        
        #nav-bar {
            background: #0f2545; padding: 15px 20px; color: #4fd1c5; font-size: 22px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 20; text-align: center;
            border-bottom: 2px solid #2c5282;
        }

        #main-content { display: flex; flex-grow: 1; position: relative; overflow: hidden; }

        #panel { 
            width: 500px; padding: 30px; background: #2d3748; box-shadow: 5px 0 25px rgba(0,0,0,0.5); 
            z-index: 10; display: flex; flex-direction: column; overflow-y: auto; border-right: 2px solid #4a5568;
        }

        h1 { color: #fbd38d; font-size: 28px; border-bottom: 3px dashed #dd6b20; padding-bottom: 12px; margin-top: 0; margin-bottom: 20px; }
        
        .context-box {
            background: rgba(0,0,0,0.3); border: 2px solid #4a5568; padding: 18px; border-radius: 12px;
            margin-bottom: 25px; font-size: 18px; color: #e2e8f0; line-height: 1.6;
        }
        
        .highlight { font-weight: bold; padding: 2px 6px; border-radius: 6px; }
        .hl-stone { background: #718096; color: white; }
        .hl-base { background: #2b6cb0; color: white; }

        /* 控制面板區 */
        .control-group {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 20px;
            border: 1px solid #4a5568;
        }

        .control-title { font-size: 20px; font-weight: bold; color: #90cdf4; margin-bottom: 15px; }

        /* 滑桿設計 */
        .slider-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .slider-info { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; }
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px;
            background: #4a5568; outline: none; transition: 0.2s; margin-top: 5px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 28px; height: 28px;
            border-radius: 50%; background: #63b3ed; cursor: pointer; border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); transition: 0.2s;
        }
        input[type="range"]:active:not(:disabled)::-webkit-slider-thumb { background: #4fd1c5; transform: scale(1.1); }
        
        /* 滑桿被禁用時的樣式 (當石頭在水中時) */
        input[type="range"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        input[type="range"]:disabled::-webkit-slider-thumb {
            background: #a0aec0;
            border-color: #cbd5e0;
            box-shadow: none;
            cursor: not-allowed;
        }

        button {
            background: #f6ad55; color: #1a202c; border: none; padding: 16px 20px; font-size: 20px;
            font-weight: bold; border-radius: 10px; cursor: pointer; transition: all 0.2s; width: 100%;
            box-shadow: 0 6px 0 #dd6b20;
        }
        button:active { transform: translateY(6px); box-shadow: 0 0 0 #dd6b20; }
        button.reset-btn { background: #4a5568; color: white; box-shadow: 0 6px 0 #2d3748; margin-top: 15px; display: none;}
        button.reset-btn:active { box-shadow: 0 0 0 #2d3748; }
        
        /* 動態數學算式區 */
        .math-box { 
            font-size: 22px; text-align: center; margin-top: 20px; padding: 20px; 
            background: rgba(0,0,0,0.4); border: 2px dashed #fbd38d; border-radius: 12px; 
            font-weight: bold; color: #fff; line-height: 1.8; transition: all 0.3s;
        }
        
        .conclusion { 
            background: rgba(229, 62, 62, 0.1); border: 2px solid #e53e3e; padding: 15px; border-radius: 12px; 
            font-size: 20px; font-weight: bold; color: #fc8181; margin-top: auto; line-height: 1.6;
            display: none; animation: popIn 0.5s;
        }

        /* 3D 空間標籤設定 */
        #canvas-container { flex-grow: 1; position: relative; background: radial-gradient(circle at center, #2d3748 0%, #1a202c 100%); }
        #instruction {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px;
            color: #a0aec0; font-size: 16px; pointer-events: none; border: 1px solid #4a5568;
        }
        
        .label-3d { 
            position: absolute; font-weight: bold; font-size: 18px; padding: 8px 14px; 
            border-radius: 8px; pointer-events: none; white-space: nowrap; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: left 0.1s, top 0.1s; z-index: 10;
        }

        /* 引線與位置設定 */
        .lbl-bottom { transform: translate(-50%, 0); margin-top: 25px; }
        .lbl-bottom::before { content: ''; position: absolute; top: -10px; left: 50%; margin-left: -8px; border-width: 0 8px 10px; border-style: solid; border-color: inherit; border-top-color: transparent; border-left-color: transparent; border-right-color: transparent; }

        .lbl-left { transform: translate(-100%, -50%); margin-left: -25px; }
        .lbl-left::after { content: ''; position: absolute; top: 50%; right: -10px; margin-top: -8px; border-width: 8px 0 8px 10px; border-style: solid; border-color: inherit; border-top-color: transparent; border-bottom-color: transparent; border-right-color: transparent; }

        .lbl-right { transform: translate(0, -50%); margin-left: 25px; }
        .lbl-right::before { content: ''; position: absolute; top: 50%; left: -10px; margin-top: -8px; border-width: 8px 10px 8px 0; border-style: solid; border-color: inherit; border-top-color: transparent; border-bottom-color: transparent; border-left-color: transparent; }

        /* 個別標籤主題 */
        .theme-edge { background: rgba(43, 108, 176, 0.95); border: 2px solid #63b3ed; color: white; }
        .theme-edge.lbl-bottom::before { border-bottom-color: #63b3ed; }
        .theme-edge.lbl-right::before { border-right-color: #63b3ed; }

        .theme-red { background: rgba(229, 62, 62, 0.95); border: 2px solid #fc8181; color: white; }
        .theme-red::after { border-left-color: #fc8181; }

        .theme-blue { background: rgba(49, 130, 206, 0.95); border: 2px solid #90cdf4; color: white; display: none; }
        .theme-blue::before { border-right-color: #90cdf4; }

        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="nav-bar">👑 終極魔王題：空間變形水箱</div>

    <div id="main-content">
        <div id="panel">
            <h1>探究：長寬與上升高度的關係</h1>
            <div class="context-box">
                有一尊體積固定為 <span class="highlight hl-stone">600 cm³</span> 的摩艾石像。<br><br>
                如果把它丟進 <span class="highlight hl-base">長和寬不同</span> 的水箱裡，水面上升的高度會一樣嗎？
            </div>
            
            <div class="control-group">
                <button id="btn-action" onclick="toggleStone()">⬇️ 丟入摩艾石像</button>
                <button id="btn-reset" class="reset-btn" onclick="toggleStone()">⬆️ 取出石像</button>
            </div>

            <div class="control-group">
                <div class="control-title">🎚️ 改變水箱的長度 (寬度固定 10cm)</div>
                <div class="slider-container">
                    <div class="slider-info">
                        <span style="color:#63b3ed;">窄水箱</span>
                        <span id="slider-val-text" style="color:#fff; font-size:24px;">長 10 cm</span>
                        <span style="color:#63b3ed;">寬水箱</span>
                    </div>
                    <input type="range" id="size-slider" min="0" max="4" step="1" value="1">
                    <div id="slider-hint" style="text-align: center; color: #fc8181; font-size: 14px; margin-top: 5px; opacity: 0;">(需先取出石像才能調整長度)</div>
                </div>
            </div>

            <div class="math-box" id="math-box">
                石像體積 ÷ (水箱長 × 水箱寬)<br>
                ＝ <span style="color:#fc8181;">水面上升高度</span><br>
                <hr style="border:1px dashed #4a5568; margin: 15px 0;">
                <span style="color:#a0aec0;">(等待石像放入...)</span>
            </div>

            <div class="conclusion" id="conclusion-box">
                💡 結論：<br>
                當物體體積固定時，容器的「長和寬」乘起來越小，水面上升的高度就越「<span id="conc-word" style="color:white; font-size:24px;">？</span>」！
            </div>
        </div>

        <div id="canvas-container">
            <div id="instruction">可旋轉視角 / 拖曳左側滑桿改變水箱大小</div>
            
            <div id="lbl-length" class="label-3d lbl-bottom theme-edge">長 10 cm</div>
            <div id="lbl-width" class="label-3d lbl-right theme-edge">寬 10 cm</div>
            
            <div id="lbl-initial" class="label-3d lbl-left theme-red">原水深 12 cm</div>
            <div id="lbl-rise" class="label-3d lbl-right theme-blue">後來水深 ? cm</div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 遊戲資料設定 (完美整數設計)
        // ==========================================
        const stoneVolume = 600;
        const initialWaterHeight = 12;
        let currentWaterY_boss = initialWaterHeight;
        
        const tankSizes = [
            { l: 5,  w: 10, rise: 12 }, 
            { l: 10, w: 10, rise: 6 },  
            { l: 15, w: 10, rise: 4 },  
            { l: 20, w: 10, rise: 3 },  
            { l: 30, w: 10, rise: 2 }   
        ];

        // ==========================================
        // 2. 動畫輔助函數
        // ==========================================
        function lerp(start, end, t) { return start + (end - start) * t; }
        function animateValue(duration, updateFn, completeFn) {
            let start = null;
            function step(timestamp) {
                if (!start) start = timestamp;
                let progress = (timestamp - start) / duration;
                if (progress > 1) progress = 1;
                updateFn(progress);
                if (progress < 1) requestAnimationFrame(step);
                else if (completeFn) completeFn();
            }
            requestAnimationFrame(step);
        }

        // ==========================================
        // 3. 初始化 3D 引擎
        // ==========================================
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 30, 70);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.target.set(0, 15, 0);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        scene.add(new THREE.DirectionalLight(0xffffff, 0.6).position.set(20, 50, 20));
        scene.add(new THREE.DirectionalLight(0x63b3ed, 0.4).position.set(-20, 30, -20));

        // ==========================================
        // 4. 建立 3D 水箱與材質
        // ==========================================
        const tankMaxHeight = 35;
        const baseWidth = 10; 
        const tankDepth = 10; 

        const tankGroup = new THREE.Group();
        scene.add(tankGroup);

        const glassMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false, shininess: 120 });
        glassMat.renderOrder = 3; 
        const waterMat = new THREE.MeshPhongMaterial({ color: 0x4299e1, transparent: true, opacity: 0.5, shininess: 90, side: THREE.DoubleSide, depthWrite: false });
        waterMat.renderOrder = 1; 
        
        const hlWaterMat = new THREE.MeshPhongMaterial({ color: 0x38a169, transparent: true, opacity: 0.8, shininess: 90, side: THREE.DoubleSide, depthWrite: false });
        hlWaterMat.renderOrder = 2; 

        const edgeMat = new THREE.LineBasicMaterial({ color: 0x63b3ed, linewidth: 2, transparent: true, opacity: 0.8 });
        
        const boxGeom = new THREE.BoxGeometry(baseWidth, tankMaxHeight, tankDepth).translate(0, tankMaxHeight/2, 0);
        const tankMesh = new THREE.Mesh(boxGeom, glassMat);
        const tankEdge = new THREE.LineSegments(new THREE.EdgesGeometry(boxGeom), edgeMat);
        tankGroup.add(tankMesh); tankGroup.add(tankEdge);

        const bottomGeom = new THREE.BoxGeometry(baseWidth, 1, tankDepth).translate(0, -0.5, 0);
        const bottomMesh = new THREE.Mesh(bottomGeom, new THREE.MeshPhongMaterial({ color: 0x2b6cb0, transparent: true, opacity: 0.8 }));
        tankGroup.add(bottomMesh);

        // 紅色原水位標記
        const origWaterPlane = new THREE.LineSegments(
            new THREE.EdgesGeometry(new THREE.PlaneGeometry(baseWidth, tankDepth).rotateX(-Math.PI / 2)),
            new THREE.LineDashedMaterial({ color: 0xe53e3e, linewidth: 2, dashSize: 0.5, gapSize: 0.5 })
        );
        origWaterPlane.position.y = initialWaterHeight;
        origWaterPlane.computeLineDistances();
        tankGroup.add(origWaterPlane);
        
        const origWaterLineFront = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-baseWidth/2, initialWaterHeight, tankDepth/2 + 0.1),
                new THREE.Vector3(baseWidth/2, initialWaterHeight, tankDepth/2 + 0.1)
            ]),
            new THREE.LineBasicMaterial({ color: 0xe53e3e, linewidth: 4 })
        );
        tankGroup.add(origWaterLineFront);

        // 藍色水體
        const water = new THREE.Mesh(new THREE.BoxGeometry(baseWidth-0.2, 1, tankDepth-0.2).translate(0, 0.5, 0), waterMat);
        water.position.set(0, 0.1, 0);
        water.scale.y = initialWaterHeight;
        tankGroup.add(water);

        // 綠色高亮水體 (代表排開的體積)
        const highlightWater = new THREE.Mesh(new THREE.BoxGeometry(baseWidth-0.2, 1, tankDepth-0.2).translate(0, 0.5, 0), hlWaterMat);
        highlightWater.position.y = initialWaterHeight + 0.1; 
        highlightWater.scale.y = 0.01;
        highlightWater.visible = false;
        tankGroup.add(highlightWater);

        // ==========================================
        // 5. 繪製 Emoji 摩艾石像 (Sprite 技術)
        // ==========================================
        const canvas = document.createElement('canvas');
        canvas.width = 256; 
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        
        ctx.shadowColor = '#fbd38d';
        ctx.shadowBlur = 20;
        ctx.font = '160px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🗿', 128, 138);

        const texture = new THREE.CanvasTexture(canvas);
        const stoneMat = new THREE.SpriteMaterial({ map: texture });
        const stone = new THREE.Sprite(stoneMat);
        
        stone.scale.set(12, 12, 1);
        const stoneStartY = 45;
        const stoneEndY = 5; 
        stone.position.set(0, stoneStartY, 0);
        scene.add(stone);

        const contactY = initialWaterHeight + 5;

        // ==========================================
        // 6. 邏輯與互動系統
        // ==========================================
        let isSubmerged = false;
        let isAnimating = false;
        const slider = document.getElementById('size-slider');
        const lblSliderVal = document.getElementById('slider-val-text');
        const mathBox = document.getElementById('math-box');
        const sliderHint = document.getElementById('slider-hint');

        slider.addEventListener('input', () => {
            const currentSize = tankSizes[slider.value];
            lblSliderVal.innerText = `長 ${currentSize.l} cm`;

            const scaleX = currentSize.l / 10;
            tankGroup.scale.x = scaleX;

            document.getElementById('lbl-length').innerText = `長 ${currentSize.l} cm`;
            document.getElementById('lbl-width').innerText = `寬 ${currentSize.w} cm`;
        });

        function updateMathUI(size) {
            mathBox.innerHTML = `
                石像體積 ÷ (水箱長 × 水箱寬)<br>
                ＝ <span style="color:#a0aec0;">600</span> ÷ ( <span style="color:#63b3ed;">${size.l}</span> × <span style="color:#63b3ed;">${size.w}</span> )<br>
                ＝ <span style="color:#a0aec0;">600</span> ÷ <span style="color:#63b3ed;">${size.l * size.w}</span><br>
                ＝ <span style="color:#fc8181; font-size:36px; text-shadow:0 0 10px red;">${size.rise}</span> cm
            `;
            document.getElementById('lbl-rise').innerHTML = `後來水深 ${initialWaterHeight + size.rise} cm<br><span style="font-size:14px; color:#fbd38d;">(上升 ${size.rise} cm)</span>`;
        }

        function toggleStone() {
            if (isAnimating) return;
            isAnimating = true;

            const currentSize = tankSizes[slider.value];
            const targetRise = currentSize.rise;
            const targetWaterY = initialWaterHeight + targetRise;
            const btnAction = document.getElementById('btn-action');
            const btnReset = document.getElementById('btn-reset');
            const concBox = document.getElementById('conclusion-box');

            if (!isSubmerged) {
                // 石像放入中...
                btnAction.style.display = 'none';
                
                // ★ 放入時：禁用滑桿，顯示提示文字
                slider.disabled = true;
                sliderHint.style.opacity = '1';

                animateValue(1500, (p) => {
                    const currentY = lerp(stoneStartY, stoneEndY, p);
                    stone.position.y = currentY;

                    let dipRatio = (contactY - currentY) / (contactY - stoneEndY);
                    dipRatio = Math.max(0, Math.min(1, dipRatio)); 

                    if (dipRatio > 0) {
                        highlightWater.visible = true;
                        highlightWater.scale.y = Math.max(0.01, targetRise * dipRatio);
                        
                        currentWaterY_boss = initialWaterHeight + (targetRise * dipRatio);
                        
                        const lblRise = document.getElementById('lbl-rise');
                        lblRise.style.display = 'block';
                        lblRise.innerHTML = `目前水深 ${currentWaterY_boss.toFixed(1)} cm`;
                    }
                }, () => {
                    isSubmerged = true;
                    isAnimating = false;
                    currentWaterY_boss = targetWaterY;
                    
                    btnReset.style.display = 'block';
                    concBox.style.display = 'block';
                    updateMathUI(currentSize);
                    
                    const concWord = document.getElementById('conc-word');
                    if(currentSize.l < 15) concWord.innerText = "高";
                    else if (currentSize.l > 15) concWord.innerText = "低";
                    else concWord.innerText = "中";
                });
            } else {
                // 石像取出中...
                btnReset.style.display = 'none';
                
                animateValue(1500, (p) => {
                    const currentY = lerp(stoneEndY, stoneStartY, p);
                    stone.position.y = currentY;

                    let dipRatio = (contactY - currentY) / (contactY - stoneEndY);
                    dipRatio = Math.max(0, Math.min(1, dipRatio));

                    if (dipRatio > 0) {
                        highlightWater.scale.y = Math.max(0.01, targetRise * dipRatio);
                        currentWaterY_boss = initialWaterHeight + (targetRise * dipRatio);
                        document.getElementById('lbl-rise').innerHTML = `目前水深 ${currentWaterY_boss.toFixed(1)} cm`;
                    } else {
                        highlightWater.visible = false;
                        document.getElementById('lbl-rise').style.display = 'none';
                        currentWaterY_boss = initialWaterHeight;
                    }
                }, () => {
                    isSubmerged = false;
                    isAnimating = false;
                    btnAction.style.display = 'block';
                    
                    // ★ 取出後：重新啟用滑桿，隱藏提示文字
                    slider.disabled = false;
                    sliderHint.style.opacity = '0';
                    
                    mathBox.innerHTML = `
                        石像體積 ÷ (水箱長 × 水箱寬)<br>
                        ＝ <span style="color:#fc8181;">水面上升高度</span><br>
                        <hr style="border:1px dashed #4a5568; margin: 15px 0;">
                        <span style="color:#a0aec0;">(等待石像放入...)</span>
                    `;
                });
            }
        }

        // ==========================================
        // 7. 動態標籤更新與渲染
        // ==========================================
        const tempVec = new THREE.Vector3(); 
        function updateLabels() {
            if(container.clientWidth === 0) return;
            const hw = container.clientWidth / 2, hh = container.clientHeight / 2;
            const currentScaleX = tankGroup.scale.x;

            // 1. 容器長度標示
            tempVec.set(0, 0, tankDepth/2).project(camera);
            document.getElementById('lbl-length').style.left = (tempVec.x * hw + hw) + 'px';
            document.getElementById('lbl-length').style.top = (-tempVec.y * hh + hh) + 'px';

            // 2. 容器寬度標示
            tempVec.set((baseWidth/2 * currentScaleX), 0, 0).project(camera);
            document.getElementById('lbl-width').style.left = (tempVec.x * hw + hw) + 'px';
            document.getElementById('lbl-width').style.top = (-tempVec.y * hh + hh) + 'px';

            // 3. 原水深標籤
            tempVec.set((-baseWidth/2 * currentScaleX), initialWaterHeight, 0).project(camera);
            document.getElementById('lbl-initial').style.left = (tempVec.x * hw + hw) + 'px';
            document.getElementById('lbl-initial').style.top = (-tempVec.y * hh + hh) + 'px';

            // 4. 動態上升高度標籤
            if (document.getElementById('lbl-rise').style.display !== 'none') {
                tempVec.set((baseWidth/2 * currentScaleX), currentWaterY_boss, 0).project(camera);
                document.getElementById('lbl-rise').style.left = (tempVec.x * hw + hw) + 'px';
                document.getElementById('lbl-rise').style.top = (-tempVec.y * hh + hh) + 'px';
            }
        }

        window.addEventListener('resize', () => {
            if(container.clientWidth === 0) return;
            camera.aspect = container.clientWidth / container.clientHeight; 
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            updateLabels();
        });

        // 摩艾輕微漂浮晃動動畫
        let time = 0;
        function animate() {
            controls.update();
            updateLabels();
            
            if (!isSubmerged && !isAnimating) {
                time += 0.05;
                stone.position.y = stoneStartY + Math.sin(time) * 1.5;
            } else if (isSubmerged && !isAnimating) {
                time += 0.02;
                stone.position.y = stoneEndY + Math.sin(time) * 0.5;
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate); 
        }

        animate();
    </script>
</body>
</html>
